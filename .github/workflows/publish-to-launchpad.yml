name: Publish PPA
on:
  push:
    branches:
      - "master"

jobs:
  launchpad-publish:
    runs-on: "ubuntu-latest"
    steps:
      - uses: ahoneybun/publish-ppa-package@v2
        with:
          repository: "aaronhoneycutt/Ubuntu-COSMIC"
          gpg_private_key: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          deb_email: "aaron@system76.com"
          deb_fullname: "Aaron Honeycutt"
